name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    name: migrations + demo on real Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: yup
          POSTGRES_PASSWORD: yup
          POSTGRES_DB: yup
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yup -d yup"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://yup:yup@localhost:5432/yup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Applies migrations, then runs the full end-to-end demo (content CRUD,
      # revisions, and the review gate) against a real database.
      - run: npm run db:migrate
      - run: npm run seed
      # Exercises the webhook pipeline end to end: transactional outbox →
      # worker fan-out → signed HTTP delivery.
      - run: npm run smoke:webhooks
      # Exercises the asset pipeline: upload → store → fetch bytes → delete.
      - run: npm run smoke:assets
      # Exercises the admin API: auth gating + human review approval over HTTP.
      - run: npm run smoke:admin
      # Exercises unique field constraints on create and update.
      - run: npm run smoke:unique
      # Exercises the GraphQL read layer (public query + non-published gating).
      - run: npm run smoke:graphql
      # Exercises scheduled publishing: schedule → due → published.
      - run: npm run smoke:schedule

  s3:
    name: assets on S3 (MinIO)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: yup
          POSTGRES_PASSWORD: yup
          POSTGRES_DB: yup
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yup -d yup"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://yup:yup@localhost:5432/yup
      CMS_STORAGE_BACKEND: s3
      CMS_S3_ENDPOINT: http://localhost:9000
      CMS_S3_REGION: us-east-1
      CMS_S3_BUCKET: yup-assets
      CMS_S3_ACCESS_KEY_ID: minioadmin
      CMS_S3_SECRET_ACCESS_KEY: minioadmin
      CMS_S3_FORCE_PATH_STYLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Run MinIO via docker (service containers can't set the required command).
      - name: Start MinIO and create the bucket
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then echo "minio up"; break; fi
            sleep 2
          done
          AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin \
            aws --endpoint-url http://localhost:9000 s3 mb s3://yup-assets
      - run: npm run db:migrate
      # Same asset smoke test, now against an S3-compatible backend.
      - run: npm run smoke:assets
