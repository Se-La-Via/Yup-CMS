# Yup CMS — one-command self-host.
#
#   cp .env.example .env   (or: npm run setup)
#   docker compose up -d
#
# Brings up Postgres, applies migrations once, then starts the read API.
# Values come from .env (see .env.example); the defaults below are dev-only.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yup}
      POSTGRES_DB: ${POSTGRES_DB:-yup}
    volumes:
      - yup_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yup} -d ${POSTGRES_DB:-yup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies pending migrations, then exits.
  migrate:
    build: .
    command: node dist/scripts/migrate.js
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-yup}:${POSTGRES_PASSWORD:-yup}@db:5432/${POSTGRES_DB:-yup}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: node dist/api/server.js
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-yup}:${POSTGRES_PASSWORD:-yup}@db:5432/${POSTGRES_DB:-yup}
      CMS_API_PORT: ${CMS_API_PORT:-3000}
      CMS_REQUIRE_API_KEY: ${CMS_REQUIRE_API_KEY:-false}
      # Asset bytes (local backend). For the MCP server to upload into the same
      # place, point its CMS_STORAGE_DIR at this volume too, or use an S3 backend.
      CMS_STORAGE_DIR: /app/storage
      # The read API never writes content, so it needs no principal. The MCP
      # server (run by your agent client) sets CMS_PRINCIPAL_TYPE/ID; see .env.example.
    volumes:
      - yup_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${CMS_API_PORT:-3000}:${CMS_API_PORT:-3000}"
    restart: unless-stopped

  # Human admin dashboard + admin API (requires an admin-scoped API key).
  admin:
    build: .
    command: node dist/admin/server.js
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-yup}:${POSTGRES_PASSWORD:-yup}@db:5432/${POSTGRES_DB:-yup}
      CMS_ADMIN_PORT: ${CMS_ADMIN_PORT:-3001}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${CMS_ADMIN_PORT:-3001}:${CMS_ADMIN_PORT:-3001}"
    restart: unless-stopped

  # Delivers webhook events from the outbox with retries. Required for webhooks.
  worker:
    build: .
    command: node dist/scripts/worker.js
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-yup}:${POSTGRES_PASSWORD:-yup}@db:5432/${POSTGRES_DB:-yup}
      CMS_WORKER_INTERVAL_MS: ${CMS_WORKER_INTERVAL_MS:-2000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  yup_pgdata:
  yup_storage:
